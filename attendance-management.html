<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Management</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
  <script src="assets/js/core.js" defer></script>
</head>

<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100">
  <nav id="main-nav"></nav>
  <div class="max-w-6xl mx-auto bg-white rounded-lg shadow-md p-6 dark:bg-gray-800">
    <h2 class="text-2xl font-bold text-indigo-700 mb-6">Attendance Management</h2>

    <form id="attendance-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 hidden">
      <div>
        <label for="student-id" class="block text-sm font-medium text-gray-700 dark:text-gray-200">Student ID</label>
        <input type="text" id="student-id" required
          class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 dark:bg-gray-700 dark:border-gray-600" />
      </div>
      <div>
        <label for="date" class="block text-sm font-medium text-gray-700 dark:text-gray-200">Date</label>
        <input type="date" id="date" required
          class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 dark:bg-gray-700 dark:border-gray-600" />
      </div>
      <div>
        <label for="status" class="block text-sm font-medium text-gray-700 dark:text-gray-200">Status</label>
        <select id="status" required
          class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 dark:bg-gray-700 dark:border-gray-600">
          <option value="present">Present</option>
          <option value="absent">Absent</option>
        </select>
      </div>
      <div class="md:col-span-1 text-right flex items-end">
        <button type="submit"
          class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 transition">Submit</button>
      </div>
    </form>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
      <div class="md:col-span-1">
        <input type="date" id="startDate" class="w-full p-2 border border-gray-300 rounded dark:bg-gray-700 dark:border-gray-600" placeholder="Start Date">
      </div>
      <div class="md:col-span-1">
        <input type="date" id="endDate" class="w-full p-2 border border-gray-300 rounded dark:bg-gray-700 dark:border-gray-600" placeholder="End Date">
      </div>
      <div class="md:col-span-1">
        <input type="text" id="searchInput" placeholder="Search ID..." class="w-full p-2 border border-gray-300 rounded dark:bg-gray-700 dark:border-gray-600">
      </div>
      <div class="flex gap-2 md:col-span-1 justify-end">
        <button onclick="exportCSV()"
          class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Export CSV</button>
      </div>
    </div>

    <div class="overflow-x-auto mb-6">
      <table class="min-w-full bg-white border border-gray-200 rounded-lg dark:bg-gray-800 dark:border-gray-700" id="attendance-table">
        <thead class="bg-gray-100 dark:bg-gray-700">
          <tr>
            <th class="px-4 py-2 text-left">Student ID</th>
            <th class="px-4 py-2 text-left">Date</th>
            <th class="px-4 py-2 text-left">Status</th>
            <th class="px-4 py-2 text-left">Actions</th>
          </tr>
        </thead>
        <tbody id="attendance-body" class="divide-y divide-gray-200 dark:divide-gray-600"></tbody>
      </table>
    </div>

    <div class="flex justify-between items-center mb-2">
      <h3 class="text-lg font-semibold">Attendance Chart</h3>
      <button id="toggleChartType" class="bg-indigo-500 text-white px-3 py-1 rounded hover:bg-indigo-600">Toggle Bar/Line</button>
    </div>
    <canvas id="attendanceChart" height="120"></canvas>
  </div>

  <script>
    const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
    const role = loggedInUser?.role || "student";
    const user = { username: loggedInUser?.username || "guest" };

    const form = document.getElementById("attendance-form");
    const tbody = document.getElementById("attendance-body");
    const searchInput = document.getElementById("searchInput");
    const startDate = document.getElementById("startDate");
    const endDate = document.getElementById("endDate");
    const toggleChartTypeBtn = document.getElementById("toggleChartType");
    let chartType = "bar";
    let attendanceRecords = [];

    if (role === "faculty") {
      form.classList.remove("hidden");
    }

    async function loadAttendance() {
        try {
            attendanceRecords = await apiFetch('/attendance');
            renderTable(attendanceRecords);
            updateChart();
        } catch (err) {
            console.error("Failed to load attendance:", err);
        }
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      const studentId = document.getElementById("student-id").value.trim();
      const date = document.getElementById("date").value;
      const status = document.getElementById("status").value;
      if (!studentId || !date || !status) return;

      try {
          await apiFetch('/attendance', {
              method: 'POST',
              body: JSON.stringify({ studentId, date, status, submittedBy: user.username })
          });
          form.reset();
          loadAttendance();
      } catch (err) {
          alert(err.message);
      }
    });

    function renderTable(records) {
      tbody.innerHTML = "";
      records.forEach((record) => {
        const actions = role === "faculty" ? `<td class="px-4 py-2 space-x-2">
          <button onclick="deleteRecord('${record._id}')" class="text-red-600 hover:underline">Delete</button>
        </td>` : "";

        const row = `<tr>
          <td class="px-4 py-2">${record.studentId}</td>
          <td class="px-4 py-2">${new Date(record.date).toLocaleDateString()}</td>
          <td class="px-4 py-2">${record.status}</td>
          ${actions}
        </tr>`;
        tbody.insertAdjacentHTML("beforeend", row);
      });
    }

    async function deleteRecord(id) {
      if (confirm("Are you sure?")) {
        try {
            await apiFetch(`/attendance/${id}`, { method: 'DELETE' });
            loadAttendance();
        } catch (err) {
            alert(err.message);
        }
      }
    }

    function filterRecords() {
      const query = searchInput.value.toLowerCase();
      const start = startDate.value;
      const end = endDate.value;

      return attendanceRecords.filter(record => {
        const match = record.studentId.toLowerCase().includes(query);
        const withinDate = (!start || record.date >= start) && (!end || record.date <= end);
        return match && withinDate;
      });
    }

    searchInput.addEventListener("input", () => renderTable(filterRecords()));
    startDate.addEventListener("change", () => { renderTable(filterRecords()); updateChart(); });
    endDate.addEventListener("change", () => { renderTable(filterRecords()); updateChart(); });

    function updateChart() {
      const labels = [...new Set(attendanceRecords.map(r => new Date(r.date).toLocaleDateString()))].sort();
      const presentCounts = labels.map(d => attendanceRecords.filter(r => new Date(r.date).toLocaleDateString() === d && r.status === "present").length);
      const absentCounts = labels.map(d => attendanceRecords.filter(r => new Date(r.date).toLocaleDateString() === d && r.status === "absent").length);

      const data = {
        labels,
        datasets: [
          { label: 'Present', backgroundColor: 'rgb(34,197,94)', data: presentCounts },
          { label: 'Absent', backgroundColor: 'rgb(239,68,68)', data: absentCounts }
        ]
      };

      if (window.attendanceChartInstance) window.attendanceChartInstance.destroy();
      window.attendanceChartInstance = new Chart(document.getElementById("attendanceChart"), {
        type: chartType,
        data,
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'top' },
            title: { display: true, text: 'Attendance Trends' }
          }
        }
      });
    }

    toggleChartTypeBtn.addEventListener("click", () => {
      chartType = chartType === "bar" ? "line" : "bar";
      updateChart();
    });

    loadAttendance();
  </script>
</body>
</html>
